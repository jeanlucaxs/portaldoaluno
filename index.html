<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualização Disponível</title>
    <style>
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            background-color: #003366; /* Azul do Colégio */
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        h1 {
            font-size: 3.5rem; /* Bem grande como você pediu */
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .btn-instalar {
            display: inline-block;
            background-color: #ffcc00; /* Amarelo Ouro */
            color: #003366;
            padding: 20px 50px;
            font-size: 1.5rem;
            font-weight: bold;
            text-decoration: none;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        .btn-instalar:hover {
            background-color: #fff;
            transform: scale(1.05);
        }
        @media (max-width: 600px) {
            h1 { font-size: 2.2rem; }
            .btn-instalar { font-size: 1.2rem; padding: 15px 30px; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>ATUALIZAÇÃO DISPONÍVEL</h1>
        <br>
        <a href="https://jeanlucaxs.github.io/csaojose/download/" target="_blank" class="btn-instalar">
            CLIQUE AQUI PARA INSTALAR
        </a>
    </div>

</body>
</html>
