<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portal do Aluno</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            /* Fundo Azul Marinho */
            background-color: #000080; 
        }

        h1 {
            color: #ffffff;
            margin-bottom: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            font-size: 2.5rem;
        }

        .container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 320px;
        }

        .btn {
            display: block;
            padding: 18px;
            text-align: center;
            text-decoration: none;
            color: white;
            border-radius: 10px;
            font-weight: bold;
            font-size: 1.1rem;
            transition: transform 0.2s, filter 0.2s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.4);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .btn:hover {
            transform: scale(1.03);
            filter: brightness(1.1);
        }

        /* Cores dos botões */
        .coc { background-color: #ff6600; }
        .nave { background-color: #20c997; }
        .pleno { background-color: #6610f2; }
        .genio { background-color: #f1c40f; color: #333; }
        .maralto { background-color: #3498db; }

    </style>
</head>
<body>

    <h1>Portal do Aluno</h1>

    <div class="container">
        <a href="https://jornada.coc.com.br/painel/" class="btn coc">COC</a>
        <a href="https://portal.naveavela.com.br/home" class="btn nave">Nave a Vela</a>
        <a href="https://portal.programapleno.com.br/home" class="btn pleno">Pleno</a>
        <a href="https://portal.geniodasfinancas.com.br/home" class="btn genio">Gênio das Finanças</a>
        <a href="https://portal.maralto.com.br/home" class="btn maralto">Maralto</a>
    </div>

</body>
</html>
